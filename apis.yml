apis:
- aid: sanity:sanity-query-api
  name: Sanity Query API
  description: The Sanity Query API enables querying Content Lake documents using GROQ (Graph-Relational Object Queries).
    Supports GET for queries under 11 KB and POST for larger queries. Available at both the standard API endpoint and a CDN
    endpoint for edge-cached results. Supports perspectives (drafts, published), result source maps, and query explain functionality.
  humanURL: https://www.sanity.io/docs/http-query
  tags:
  - GROQ
  - Query
  - Content Lake
  - CDN
  properties:
  - type: Documentation
    url: https://www.sanity.io/docs/http-query
