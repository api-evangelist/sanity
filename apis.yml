aid: sanity
name: Sanity
description: Sanity is a composable content platform providing a headless CMS with a real-time collaborative editor (Sanity
  Studio) and a powerful HTTP API for managing structured content. The Sanity Content Lake stores content as flexible documents
  queryable via GROQ (Graph-Relational Object Queries). Key API capabilities include document querying, mutations, real-time
  listening, asset management, project management, webhooks, scheduling, roles and permissions, vector embeddings, and AI-powered
  content agents.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Headless CMS
- Content Management
- GROQ
- Real-Time
- Structured Content
- Developer Platform
