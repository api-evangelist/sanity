      - name: Sanity Studio
      - name: Sanity Query API (GROQ)
      - name: Sanity Mutation API
      - name: Sanity Assets API
      - name: Sanity Webhooks API
      - name: Sanity Listen API (real-time)
      - name: Sanity Scheduling API
      - name: Email Support
  - id: sanity-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier with customizable seats, roles, datasets, quotas, and dedicated
      support. Pricing on request.
    entries:
      - label: Custom contract
        name: custom
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Customizable Seats
      - name: Custom Roles
      - name: Custom Datasets
      - name: Custom Quotas
      - name: Dedicated Support
      - name: SAML SSO
      - name: Priority SLA
