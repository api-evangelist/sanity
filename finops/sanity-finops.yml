specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Sanity
providerId: sanity
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Headless CMS
  - Content Management
  - Developer Platform
description: FOCUS-aligned FinOps for Sanity. Tiered SaaS subscription (per-seat) with included monthly
  quotas and metered overages on CDN requests, direct API requests, asset storage, and bandwidth.
sources:
  - https://www.sanity.io/pricing
  - https://www.sanity.io/docs/api-cdn
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Sanity.io
serviceCategory: Developer Tools / Headless CMS
billingModel:
  pricingCategory: Tiered Subscription + Usage Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Sanity
  ServiceCategory: Developer Tools
  ServiceSubcategory: Headless CMS
  ProviderName: Sanity
  PublisherName: Sanity.io
  InvoiceIssuerName: Sanity.io
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: seat-month, request, GB
meters:
  - name: seat_subscription
    description: Per-seat monthly subscription on Growth ($15/seat/month, up to 50 seats).
    unit: seat-month
    aggregation: sum
    dimensions:
      - plan
      - role
  - name: api_cdn_requests
    description: API CDN request count; first 1M/month included on Free and Growth, then $1 per 250K
      on Growth.
    unit: request
    aggregation: sum
    dimensions:
      - dataset
      - plan
  - name: api_requests
    description: Direct (non-CDN) API request count; first 250K/month included on Free and Growth, then
      $1 per 25K on Growth.
    unit: request
    aggregation: sum
    dimensions:
      - dataset
      - api
      - plan
  - name: asset_storage
    description: Asset storage in GB; first 100 GB included on Free and Growth, then $0.50/GB on Growth.
    unit: GB-month
    aggregation: max
    dimensions:
      - dataset
      - plan
  - name: bandwidth
    description: Outbound bandwidth in GB; first 100 GB/month included on Free and Growth, then $0.30/GB
      on Growth.
    unit: GB
    aggregation: sum
    dimensions:
      - dataset
      - plan
  - name: documents
    description: Document count cap by plan (10K Free / 25K Growth).
    unit: document
    aggregation: max
    dimensions:
      - dataset
      - plan
  - name: addons
    description: Flat-rate Growth add-ons (SAML SSO $1,399/mo, Dedicated Support $799/mo, Increased Quota
      $299/mo, Extra Dataset $999/dataset).
    unit: month
    aggregation: sum
    dimensions:
      - addon
principles:
  - name: Visibility
    description: Use the Sanity project usage dashboard to see CDN requests, direct API requests, asset
      storage, and bandwidth against included quotas; the same numbers determine overage charges on Growth.
  - name: Allocation
    description: Allocate cost by dataset (each Growth project includes 2 datasets, additional datasets
      are $999/each) and by seat (each Growth seat is $15/month). Use dataset naming conventions to map
      to teams or environments.
  - name: Optimization
    description: "Drive reads through the API CDN (`useCdn: true`) — cached responses are not rate limited and don't consume the direct-API quota. Right-size seat counts (Growth caps at 50 seats; move to Enterprise when sustained) and consolidate small datasets to avoid the per-dataset add-on."
  - name: Accountability
    description: A single billing owner per project receives Sanity invoices; map overage line items
      (CDN requests, API requests, assets, bandwidth) back to the responsible team via dataset tags before
      chargeback.
maintainers:
