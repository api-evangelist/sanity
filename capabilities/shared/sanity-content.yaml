naftiko: "1.0.0-alpha1"

info:
  label: "Sanity Content API"
  description: >-
    Provides GROQ-based querying and mutation operations against Sanity
    Content Lake, enabling reading and writing structured content documents.
  tags:
    - Content Management
    - GROQ
    - Headless CMS
    - Sanity
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SANITY_API_TOKEN: SANITY_API_TOKEN
      SANITY_PROJECT_ID: SANITY_PROJECT_ID

capability:
  consumes:
    - type: http
      namespace: sanity-content
      baseUri: https://{{SANITY_PROJECT_ID}}.api.sanity.io/v2024-01-01
      description: "Sanity Content Lake API for querying and mutating structured content"
      authentication:
        type: bearer
        token: "{{SANITY_API_TOKEN}}"
      resources:
        - name: query
          path: /data/query
          description: "GROQ query endpoint for reading content"
          operations:
            - name: query-documents
              method: GET
              description: "Query Content Lake documents using GROQ"
              inputParameters:
                - name: dataset
                  in: path
                  type: string
                  required: true
                  description: "Dataset name (e.g., production)"
                - name: query
                  in: query
                  type: string
                  required: true
                  description: "GROQ query string"
                - name: perspective
                  in: query
                  type: string
                  required: false
                  description: "Content perspective (drafts, published, raw)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: query-documents-post
              method: POST
              description: "Query Content Lake via POST for large queries"
              inputParameters:
                - name: dataset
                  in: path
                  type: string
                  required: true
                  description: "Dataset name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  params: "{{tools.params}}"

        - name: mutations
          path: /data/mutate
          description: "Document create, update, and delete operations"
          operations:
            - name: mutate-documents
              method: POST
              description: "Apply batch mutations to Content Lake documents"
              inputParameters:
                - name: dataset
                  in: path
                  type: string
                  required: true
                  description: "Dataset name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  mutations: "{{tools.mutations}}"

        - name: assets
          path: /assets/images
          description: "Image asset upload and management"
          operations:
            - name: upload-image-asset
              method: POST
              description: "Upload an image asset to Content Lake"
              inputParameters:
                - name: dataset
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sanity-content-api
      resources:
        - path: /v1/content/query
          operations:
            - method: POST
              name: query-documents
              description: "Query Content Lake using GROQ"
              call: "sanity-content.query-documents-post"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/content/mutate
          operations:
            - method: POST
              name: mutate-documents
              description: "Apply mutations to content documents"
              call: "sanity-content.mutate-documents"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sanity-content-mcp
      transport: http
      tools:
        - name: query-content
          description: "Query Sanity Content Lake using GROQ"
          hints:
            readOnly: true
            openWorld: false
          call: "sanity-content.query-documents-post"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."

        - name: mutate-content
          description: "Create, update, or delete Sanity content documents"
          hints:
            readOnly: false
            destructive: false
          call: "sanity-content.mutate-documents"
          outputParameters:
            - type: object
              mapping: "$."
