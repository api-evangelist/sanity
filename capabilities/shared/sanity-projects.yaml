naftiko: "1.0.0-alpha1"

info:
  label: "Sanity Projects API"
  description: >-
    Provides programmatic management of Sanity projects including creating
    projects, managing datasets, configuring CORS origins, managing access
    tokens, and configuring webhooks.
  tags:
    - Project Management
    - Administration
    - Access Control
    - Sanity
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SANITY_API_TOKEN: SANITY_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: sanity-projects
      baseUri: https://api.sanity.io/v2024-01-01
      description: "Sanity management API for project, dataset, token, and webhook administration"
      authentication:
        type: bearer
        token: "{{SANITY_API_TOKEN}}"
      resources:
        - name: projects
          path: /projects
          description: "Project lifecycle management"
          operations:
            - name: list-projects
              method: GET
              description: "List all projects accessible to the authenticated user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-project
              method: POST
              description: "Create a new Sanity project"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"

            - name: get-project
              method: GET
              description: "Get details for a specific project"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: datasets
          path: /projects/{projectId}/datasets
          description: "Dataset management for a project"
          operations:
            - name: list-datasets
              method: GET
              description: "List all datasets in a project"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tokens
          path: /projects/{projectId}/tokens
          description: "API token management"
          operations:
            - name: list-tokens
              method: GET
              description: "List API tokens for a project"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-token
              method: POST
              description: "Create a new API token for a project"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  label: "{{tools.label}}"
                  roleName: "{{tools.roleName}}"

        - name: webhooks
          path: /hooks/projects/{projectId}
          description: "Webhook configuration management"
          operations:
            - name: list-webhooks
              method: GET
              description: "List webhooks for a project"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-webhook
              method: POST
              description: "Create a webhook for event notifications"
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  url: "{{tools.url}}"
                  dataset: "{{tools.dataset}}"
                  on: "{{tools.on}}"

  exposes:
    - type: rest
      port: 8101
      namespace: sanity-projects-api
      resources:
        - path: /v1/projects
          operations:
            - method: GET
              name: list-projects
              description: "List all Sanity projects"
              call: "sanity-projects.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/projects/{projectId}/datasets
          operations:
            - method: GET
              name: list-datasets
              description: "List datasets for a project"
              call: "sanity-projects.list-datasets"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/projects/{projectId}/webhooks
          operations:
            - method: GET
              name: list-webhooks
              description: "List webhooks for a project"
              call: "sanity-projects.list-webhooks"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: sanity-projects-mcp
      transport: http
      tools:
        - name: list-projects
          description: "List all Sanity projects"
          hints:
            readOnly: true
            openWorld: false
          call: "sanity-projects.list-projects"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-datasets
          description: "List datasets in a Sanity project"
          hints:
            readOnly: true
            openWorld: false
          call: "sanity-projects.list-datasets"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-webhook
          description: "Create a webhook for content change notifications"
          hints:
            readOnly: false
          call: "sanity-projects.create-webhook"
          outputParameters:
            - type: object
              mapping: "$."
